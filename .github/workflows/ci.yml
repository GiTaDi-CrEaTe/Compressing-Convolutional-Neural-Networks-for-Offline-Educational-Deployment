name: Edge AI Compression CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install tensorflow pytest numpy scikit-learn matplotlib seaborn
        
    - name: Execute Output Invariance Test Suite (PyTest)
      run: |
        pytest tests/test_pipeline.py -v

    - name: Run Edge Inference Benchmark
      run: |
        python benchmark.py